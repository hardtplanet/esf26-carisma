    <style>
        :root {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --mulher: #EC4899;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #111827;
            --text2: #6B7280;
            --border: #E5E7EB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, var(--mulher) 100%);
            color: #fff;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-row input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .search-row input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
        }

        .cat-tab {
            padding: 10px 20px;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .cat-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .cat-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .material-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border);
            transition: 0.2s;
            cursor: pointer;
        }

        .material-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-light);
        }

        .material-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .material-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .material-category {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary);
            color: #fff;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .material-category.diretriz {
            background: #059669;
        }

        .material-category.formulario {
            background: #DC2626;
        }

        .material-category.apoio {
            background: #7C3AED;
        }

        .material-category.legislacao {
            background: #D97706;
        }

        .material-desc {
            font-size: 0.82rem;
            color: var(--text2);
            line-height: 1.5;
        }

        .material-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 16px;
            background: var(--primary);
            color: #fff;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }

        .material-link:hover {
            background: var(--primary-dark);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .btn-voltar {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            background: var(--primary-dark);
        }

        @media print {
            .header, .search-row, .category-tabs, .btn-voltar {
                display: none;
            }
        }
    </style>
</head>

        let currentCategory = 'all';

        function renderMaterials(filter = '', category = 'all') {
            const grid = document.getElementById('materials-grid');
            const empty = document.getElementById('empty-state');
            
            let filtered = materials;
            
            if (category !== 'all') {
                filtered = filtered.filter(m => m.category === category);
            }
            
            if (filter) {
                const search = filter.toLowerCase();
                filtered = filtered.filter(m => 
                    m.title.toLowerCase().includes(search) || 
                    m.desc.toLowerCase().includes(search)
                );
            }
            
            if (filtered.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            empty.style.display = 'none';
            
            grid.innerHTML = filtered.map(m => `
                <div class="material-card" onclick="openMaterial('${m.file}')">
                    <div class="material-icon">${m.icon}</div>
                    <span class="material-category ${m.type}">${m.type === 'diretriz' ? 'Diretriz' : m.type === 'formulario' ? 'Formulário' : m.type === 'apoio' ? 'Apoio' : 'Legislação'}</span>
                    <div class="material-title">${m.title}</div>
                    <div class="material-desc">${m.desc}</div>
                    <span class="material-link">📂 Abrir / Baixar</span>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            const search = document.getElementById('search-input').value;
            renderMaterials(search, cat);
        }

        function filterMaterials() {
            const search = document.getElementById('search-input').value;
            renderMaterials(search, currentCategory);
        }

        function openMaterial(file) {
            window.open(file, '_blank');
        }

        // Initial render
        renderMaterials();
    </script>
